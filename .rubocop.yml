require:
  - ./linters/rubocop/cop/rspec/no_before_hook

inherit_from: .rubocop_todo.yml

inherit_mode:
  merge:
    - Exclude

plugins:
  - rubocop-capybara
  - rubocop-i18n
  - rubocop-rails
  - rubocop-rspec
  - rubocop-rspec_rails

AllCops:
  DefaultFormatter: fuubar
  DisplayCopNames: true
  EnabledByDefault: true
  Exclude: [db/schema.rb, node_modules/**/*, vendor/**/*]

################################################################################
#
# Rules that depart from rubocop defaults
#
################################################################################

Style/ModuleFunction: { EnforcedStyle: extend_self }
Layout/LineLength:
  Max: 80
  AutoCorrect: true
  Exclude: ['config/**/*']
Layout/MultilineMethodCallIndentation: { EnforcedStyle: indented }
Layout/MultilineOperationIndentation: { EnforcedStyle: indented }
Metrics/BlockLength:
  AllowedMethods:
    - configure
    - describe
  Exclude:
    - Guardfile
    - db/schema.rb
    - config/environments/development.rb
# https://github.com/rubocop-hq/rubocop/issues/7841
Style/TrailingCommaInBlockArgs: { Enabled: false }
Rails/FilePath: { EnforcedStyle: slashes }
RSpec/MultipleExpectations:
  Exclude:
    - spec/system/**/*.rb
RSpec/MessageExpectation: { EnforcedStyle: expect }
RSpec/MultipleMemoizedHelpers:
  Max: 0
  AllowSubject: false
  Exclude:
    - spec/linters/rubocop/**/*.rb
Style/ArrayFirstLast: { Exclude: [Guardfile] }
Style/MethodCallWithArgsParentheses:
  AllowedMethods:
    - attr_accessor
    - attr_reader
    - attr_writer
    - belongs_to
    - cattr_accessor
    - context
    - default
    - delegate
    - describe
    - enum
    - exec
    - exit
    - fit
    - gem
    - has_many
    - has_one
    - has_rich_text
    - helper_method
    - include
    - it
    - layout
    - load
    - not_to
    - p
    - puts
    - rails_require
    - raise
    - require
    - require_relative
    - ruby
    - source
    - store_accessor
    - to
    - validates
    - warn
  IgnoreMacros: false
  Exclude:
    - bin/**/*
    - 'config.ru'
    - 'config/boot.rb'
    - 'config/puma.rb'
    - 'config/routes.rb'
    - db/**/*.rb
    - Guardfile
    - Gemfile
Style/MixinUsage: { Exclude: ['bin/**/*'] }
Style/NumericLiterals: { Exclude: [db/schema.rb] }
Style/StringLiterals: { EnforcedStyle: double_quotes }
Style/StringLiteralsInInterpolation: { EnforcedStyle: double_quotes }
Style/SymbolArray: { EnforcedStyle: brackets }
Style/TrailingCommaInArguments: { EnforcedStyleForMultiline: comma }
Style/TrailingCommaInArrayLiteral: { EnforcedStyleForMultiline: comma }
Style/TrailingCommaInHashLiteral: { EnforcedStyleForMultiline: comma }
Style/WordArray: { EnforcedStyle: brackets }

I18n/GetText/DecorateString:
  Exclude:
    - linters/**/*.rb
I18n/RailsI18n/DecorateString:
  Exclude:
    - linters/**/*.rb

################################################################################
#
# Rules we don't want to enable
#
################################################################################

Bundler/GemComment: { Enabled: false }
Capybara/AmbiguousClick: { Enabled: false }
Layout/SingleLineBlockChain: { Enabled: false }
Lint/ConstantResolution: { Enabled: false }
Rails/OrderById: { Enabled: false }
Rails/RakeEnvironment: { Enabled: false }
Rails/RedundantPresenceValidationOnBelongsTo: { Enabled: false }
Rails/SchemaComment: { Enabled: false }
RSpec/AlignLeftLetBrace: { Enabled: false }
RSpec/AlignRightLetBrace: { Enabled: false }
Style/CommentedKeyword: { Enabled: false }
Style/ConstantVisibility: { Enabled: false }
Style/Copyright: { Enabled: false }
Style/Documentation: { Enabled: false }
Style/DocumentationMethod: { Enabled: false }
Style/InlineComment: { Enabled: false }
Style/MissingElse: { Enabled: false }
Style/RequireOrder: { Enabled: false }
Style/SafeNavigation: { Enabled: false }
Style/StringHashKeys: { Enabled: false }
